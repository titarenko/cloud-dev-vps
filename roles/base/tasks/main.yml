---
- name: Update apt cache and upgrade all packages
  apt:
    update_cache: true
    upgrade: full
    cache_valid_time: 0

- name: Install base packages
  apt:
    name:
      - htop
      - gdu
      - curl
      - git
      - tmux
    state: present

- name: Deploy SSH hardening config
  copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      PubkeyAuthentication yes
      AuthenticationMethods publickey
      KbdInteractiveAuthentication no
    owner: root
    group: root
    mode: "0644"
  notify: reload sshd

- name: Stop sshd from accepting client locale env vars
  # AcceptEnv is additive and cannot be reset from a drop-in, so neutralize
  # the default "AcceptEnv LANG LC_*" in the main config. This prevents
  # macOS Terminal's malformed LC_CTYPE=UTF-8 from triggering setlocale warnings.
  replace:
    path: /etc/ssh/sshd_config
    regexp: '^(\s*AcceptEnv\s+.*)$'
    replace: '#\1'
  notify: reload sshd
