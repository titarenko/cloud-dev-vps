---
- name: Configure git user name
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global
  tags: git

- name: Configure git user email
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global
  tags: git

- name: Configure git aliases
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: "alias.{{ item.alias }}"
    value: "{{ item.command }}"
    scope: global
  tags: git
  loop:
    - alias: st
      command: status
    - alias: co
      command: checkout
