---
- name: Create dev user
  user:
    name: "{{ dev_user }}"
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Read passwd entry for dev user
  getent:
    database: passwd
    key: "{{ dev_user }}"

- name: Cache dev user UID
  set_fact:
    dev_user_uid: "{{ ansible_facts.getent_passwd[dev_user][1] }}"

- name: Resolve Ansible connection user
  set_fact:
    ansible_connection_user: "{{ ansible_user | default(ansible_ssh_user, true) | default(ansible_user_id, true) }}"

- name: Read passwd entry for Ansible connection user
  getent:
    database: passwd
    key: "{{ ansible_connection_user }}"

- name: Check Ansible user's authorized_keys
  stat:
    path: "{{ ansible_facts.getent_passwd[ansible_connection_user][4] }}/.ssh/authorized_keys"
  register: ansible_user_authorized_keys

- name: Read Ansible user's authorized_keys
  slurp:
    src: "{{ ansible_facts.getent_passwd[ansible_connection_user][4] }}/.ssh/authorized_keys"
  register: ansible_user_authorized_keys_content
  when: ansible_user_authorized_keys.stat.exists

- name: Append Ansible user's SSH keys to dev user
  authorized_key:
    user: "{{ dev_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ (ansible_user_authorized_keys_content.content | b64decode).splitlines() | map('trim') | reject('equalto', '') | reject('match', '^#') | list }}"
  when: ansible_user_authorized_keys.stat.exists

- name: Ensure ~/bin exists
  file:
    path: "/home/{{ dev_user }}/bin"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Install uv
  become_user: "{{ dev_user }}"
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
    creates: "/home/{{ dev_user }}/.local/bin/uv"

- name: Install antigravity CLI (agy)
  become_user: "{{ dev_user }}"
  shell: curl -fsSL https://antigravity.google/cli/install.sh | bash
  args:
    executable: /bin/bash
    creates: "/home/{{ dev_user }}/.local/bin/agy"

- name: Install nvm
  become_user: "{{ dev_user }}"
  shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
  args:
    executable: /bin/bash
    creates: "/home/{{ dev_user }}/.nvm/nvm.sh"

- name: Install latest LTS Node.js via nvm
  become_user: "{{ dev_user }}"
  shell: |
    source ~/.nvm/nvm.sh
    nvm install --lts
    nvm alias default node
  args:
    executable: /bin/bash
    creates: "/home/{{ dev_user }}/.nvm/alias/default"

- name: Install global npm packages
  become_user: "{{ dev_user }}"
  shell: |
    source ~/.nvm/nvm.sh
    npm list -g --depth=0 {{ item }} | grep -q {{ item }} || { npm install -g {{ item }}; echo changed; }
  args:
    executable: /bin/bash
  register: _npm_globals
  changed_when: "'changed' in _npm_globals.stdout"
  loop:
    - pnpm
    - "@anthropic-ai/claude-code"

- name: Install rootless Docker prerequisites
  apt:
    name:
      - uidmap
      - dbus-user-session
      - curl
    state: present

- name: Enable linger so dev user services survive logout
  command: loginctl enable-linger {{ dev_user }}
  changed_when: false

- name: Load nf_tables kernel module for rootless Docker
  modprobe:
    name: nf_tables
    state: present

- name: Download Docker rootless install script
  get_url:
    url: https://get.docker.com/rootless
    dest: /tmp/rootless-install.sh
    mode: "0755"

- name: Run Docker rootless install
  become_user: "{{ dev_user }}"
  shell: /tmp/rootless-install.sh
  args:
    creates: "/home/{{ dev_user }}/bin/dockerd-rootless.sh"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ dev_user_uid }}"
    HOME: "/home/{{ dev_user }}"

- name: Ensure Docker CLI plugin directory exists
  become_user: "{{ dev_user }}"
  file:
    path: "/home/{{ dev_user }}/.docker/cli-plugins"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Install Docker Compose CLI plugin
  become_user: "{{ dev_user }}"
  get_url:
    url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-{{ docker_compose_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
    dest: "/home/{{ dev_user }}/.docker/cli-plugins/docker-compose"
    mode: "0755"

- name: Enable and start rootless Docker user service
  become_user: "{{ dev_user }}"
  systemd:
    name: docker
    scope: user
    state: started
    enabled: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ dev_user_uid }}"

- name: Export rootless Docker PATH and DOCKER_HOST in bashrc
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "/home/{{ dev_user }}/.bashrc"
    marker: "# {mark} ansible rootless docker"
    create: true
    block: |
      export PATH=/home/{{ dev_user }}/bin:$PATH
      export DOCKER_HOST=unix:///run/user/{{ dev_user_uid }}/docker.sock

- name: Ensure ~/.claude exists
  file:
    path: "/home/{{ dev_user }}/.claude"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0700"

- name: Configure Claude Code bypass permissions
  become_user: "{{ dev_user }}"
  copy:
    dest: "/home/{{ dev_user }}/.claude/settings.json"
    content: |
      {
        "theme": "dark",
        "permissions": {
          "defaultMode": "bypassPermissions"
        }
      }
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0600"

- name: Ensure ~/.gemini exists
  file:
    path: "/home/{{ dev_user }}/.gemini"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0700"

- name: Ensure ~/.gemini/antigravity-cli exists
  file:
    path: "/home/{{ dev_user }}/.gemini/antigravity-cli"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0700"

- name: Configure Antigravity CLI bypass permissions
  become_user: "{{ dev_user }}"
  copy:
    dest: "/home/{{ dev_user }}/.gemini/antigravity-cli/settings.json"
    content: |
      {
        "toolPermission": "always-proceed"
      }
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0600"

- name: Ensure ~/bin is on PATH
  become_user: "{{ dev_user }}"
  lineinfile:
    path: "/home/{{ dev_user }}/.bashrc"
    line: 'export PATH="$HOME/bin:$PATH"'
    create: true

- name: Configure git user name
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global
  tags: git

- name: Configure git user email
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global
  tags: git

- name: Configure git aliases
  become_user: "{{ dev_user }}"
  community.general.git_config:
    name: "alias.{{ item.alias }}"
    value: "{{ item.command }}"
    scope: global
  tags: git
  loop:
    - alias: st
      command: status
    - alias: co
      command: checkout

- name: Deploy add-repo script
  template:
    src: add-repo.j2
    dest: "/home/{{ dev_user }}/bin/add-repo"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
